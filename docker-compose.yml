services:
  engine:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "8080:8080"
    restart: unless-stopped
    expose:
      - "8000"
      - "8080"    
    networks:
      - lob_network

  proxy:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - engine
    networks:
      - lob_network

networks:
  lob_network:
    driver: bridge
