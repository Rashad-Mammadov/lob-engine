events {
    worker_connections 1024;
}

http {
    upstream lob_backend {
        # 'engine' will be the hostname of the C++ container in Docker network
        server engine:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://lob_backend;
            
            # Essential headers for forwarding requests accurately
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            tcp_nodelay on;
        }
    }
}